name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - fynd-App-version-1
    paths:
      - 'server/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment: production
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Validate required secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$OPENAI_API_KEY" || (echo "Missing OPENAI_API_KEY" && exit 1)
          test -n "$GOOGLE_PLACES_API_KEY" || (echo "Missing GOOGLE_PLACES_API_KEY" && exit 1)

      - name: Push Worker secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          echo "$OPENAI_API_KEY" | wrangler secret put OPENAI_API_KEY
          echo "$GOOGLE_PLACES_API_KEY" | wrangler secret put GOOGLE_PLACES_API_KEY

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Smoke test worker endpoints
        shell: bash
        run: |
          TEXT_BODY=$(curl -s "https://fynd-api.jallohosmanamadu311.workers.dev/api/places/textsearch?query=restaurants%20in%20Berea")
          NEARBY_BODY=$(curl -s "https://fynd-api.jallohosmanamadu311.workers.dev/api/places/nearbysearch?location=51.5074,-0.1278&radius=2000&type=hospital")
          GEOCODE_BODY=$(curl -s "https://fynd-api.jallohosmanamadu311.workers.dev/api/places/geocode?latlng=37.5722,-84.2887")

          echo "$TEXT_BODY" | grep -q '"status":"OK"' || (echo "Textsearch failed" && exit 1)
          echo "$NEARBY_BODY" | grep -q '"status":"OK"' || (echo "Nearbysearch failed" && exit 1)
          echo "$GEOCODE_BODY" | grep -q '"status":"OK"' || (echo "Geocode failed" && exit 1)

          echo "Worker smoke checks passed"
